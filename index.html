<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
}

/* Input Screen */
#startScreen {
    margin-top: 100px;
}

input {
    padding: 10px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #ff4b5c;
    color: white;
    margin-top: 10px;
}

/* Main Content */
#mainContent {
    display: none;
}

/* Greeting Card */
.card {
    background: white;
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

/* Slider */
.slider {
    width: 100%;
    overflow: hidden;
}

.slide {
    display: none;
}

img {
    width: 90%;
    border-radius: 15px;
    margin: 10px;
}

/* Mobile Friendly */
@media(max-width:600px){
    h1 { font-size: 22px; }
}
</style>
</head>

<body>

<!-- Name Input -->
<div id="startScreen">
    <h2>Enter Your Name 🎁</h2>
    <input type="text" id="nameInput" placeholder="Your Name">
    <br>
    <button onclick="start()">Start</button>
</div>

<!-- Main Content -->
<div id="mainContent">

    <!-- Greeting Slide -->
    <div class="slide" id="slide1">
        <div class="card">
            <h1 id="wish"></h1>
            <p>
                You are not just my brother, you are my best friend 💙  
                Wishing you lots of happiness, success and love! 🎂✨
            </p>
        </div>
    </div>

    <!-- Photos Slide -->
    <div class="slide" id="slide2">
        <h2>Memories 📸</h2>
        <img src="photo1.jpg">
        <img src="photo2.jpg">
        <img src="photo3.jpg">
    </div>

    <!-- Music -->
    <audio id="song" autoplay loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
let currentSlide = 0;
let slides = document.getElementsByClassName("slide");

function start() {
    let name = document.getElementById("nameInput").value;

    if(name == ""){
        alert("Please enter name!");
        return;
    }

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    document.getElementById("wish").innerText =
        "Happy Birthday " + name + " 🎉";

    showSlide();

    // Confetti 🎊
    confetti({
        particleCount: 200,
        spread: 100
    });
}

function showSlide(){
    for(let i=0; i<slides.length; i++){
        slides[i].style.display = "none";
    }

    slides[currentSlide].style.display = "block";

    currentSlide++;
    if(currentSlide >= slides.length){
        currentSlide = 0;
    }

    setTimeout(showSlide, 3000);
}
</script>

</body>
</html>
